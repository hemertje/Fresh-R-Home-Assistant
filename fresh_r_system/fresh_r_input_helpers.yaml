# Home Assistant input helpers for Fresh-R date picker
# Add this to your configuration.yaml or via UI: Settings > Devices & Services > Helpers

input_datetime:
  fresh_r_start_date:
    name: Fresh-R Start Datum
    has_date: true
    has_time: false
    icon: mdi:calendar-start
  
  fresh_r_end_date:
    name: Fresh-R Eind Datum
    has_date: true
    has_time: false
    icon: mdi:calendar-end

input_button:
  fresh_r_update_graphs:
    name: Fresh-R Update Grafieken
    icon: mdi:chart-line

# Automation to update graphs when button pressed
automation:
  - id: fresh_r_update_graphs
    alias: Fresh-R Update Grafieken
    trigger:
      - platform: state
        entity_id: input_button.fresh_r_update_graphs
    action:
      - service: homeassistant.update_entity
        target:
          entity_id:
            - sensor.fresh_r_t1_indoor_temperature
            - sensor.fresh_r_co2
            - sensor.fresh_r_humidity
    mode: single
