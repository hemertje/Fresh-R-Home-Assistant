    <!-- PWA Service Worker Registration and Install Popup Logic -->
    <script>
    // Register service worker if supported
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
            navigator.serviceWorker.register('sw.js?v=1.0.0').catch(function(err) {
                console.warn('ServiceWorker registration failed:', err);
            });
        });
    }

    // Handle PWA install prompt
    let deferredPrompt;
    const popup = document.getElementById('pwa-install-popup');
    const installBtn = document.getElementById('pwa-install-btn');
    const dismissBtn = document.getElementById('pwa-dismiss-btn');
    let installAvailable = false;


    window.addEventListener('beforeinstallprompt', (e) => {
        if (localStorage.getItem('pwaInstallDismissed') === '1') return;
        e.preventDefault();
        deferredPrompt = e;
        popup.style.display = 'block';
        installAvailable = true;
    });

    installBtn && installBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                popup.style.display = 'none';
            }
            deferredPrompt = null;
        }
    });

    dismissBtn && dismissBtn.addEventListener('click', () => {
        popup.style.display = 'none';
        localStorage.setItem('pwaInstallDismissed', '1');
    });
    </script>
