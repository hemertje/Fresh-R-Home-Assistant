name: Fresh-R Integration Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        name: Fresh-R Home Assistant Integration ${{ github.ref_name }}
        body: |
          🎯 **Fresh-R Integration v2.0.5.7 - Complete Multi-language Package**
          
          ## 🌍 MULTI-LANGUAGE BREAKTHROUGH
          - ✅ **Deutsch:** Complete German interface support
          - ✅ **Français:** Complete French interface support  
          - ✅ **English:** Complete English interface support
          - ✅ **Nederlands:** Complete Dutch interface support
          - ✅ **Auto-detection:** Lovelace card detects HA language preference
          - ✅ **Config Flow:** Multi-language setup in 4 languages
          
          ## �️ REPOSITORY STRUCTURE OVERHAUL
          - ✅ **Logical Structure:** Professional repository layout
          - ✅ **Documentation:** Complete README with FAQ
          - ✅ **File Organization:** Proper folder structure
          - ✅ **Testing Suite:** Comprehensive test utilities
          - ✅ **Grafana Dashboard:** Ready-to-import dashboard
          
          ## � TECHNICAL IMPROVEMENTS
          - 🛡️ **Rate Limiting:** Safe intervals (5min login, 15min data)
          - � **Token Management:** 75min expiry with proactive refresh
          - 🍪 **Cookie Handling:** Persistent session management
          - � **API Client:** Robust error handling and recovery
          - 🎯 **Production Ready:** All tests passed (4/4)
          
          ## � WHAT'S INCLUDED
          - **Core Integration:** Complete Home Assistant integration
          - **Multi-language:** 4 language translations (en, nl, de, fr)
          - **Lovelace Card:** Multi-language dashboard card
          - **Grafana Dashboard:** Ready-to-import JSON
          - **Documentation:** README.md + comprehensive FAQ
          - **Testing:** Standalone test suite
          - **Utilities:** Validation and simulation tools
          
          ## 🚀 INSTALLATION
          1. Download `fresh_r_v2.0.5.6_complete.zip`
          2. Extract to Home Assistant `<config>/` folder
          3. Copy files:
             - `custom_components/fresh_r/` → `<config>/custom_components/`
             - `www/fresh-r-card.js` → `<config>/www/`
          4. Restart Home Assistant
          5. Add Fresh-R integration via Settings → Devices & Services
          6. Set your language in Settings → Profile → Language
          7. Enjoy multi-language interface!
          
          ## 🌍 LANGUAGE SUPPORT
          | Language | Config Flow | Lovelace Card | Status |
          |----------|--------------|----------------|--------|
          | 🇬🇧 English | ✅ Full English interface | ✅ English labels | Fully Supported |
          | 🇳🇱 Nederlands | ✅ Volledig Nederlandse interface | ✅ Nederlandse labels | Fully Supported |
          | 🇩🇪 Deutsch | ✅ Vollständige Deutsche Oberfläche | ✅ Deutsche Beschriftungen | Fully Supported |
          | 🇫🇷 Français | ✅ Interface française complète | ✅ Étiquettes françaises | Fully Supported |
          
          ## 🎉 BREAKTHROUGH
          **Complete multi-language Fresh-R integration with professional repository structure!**
          
          The integration now supports 4 languages and includes comprehensive documentation,
          testing suite, and professional file organization.
          
          ---
          **Multi-language Mission Accomplished** �✨🚀
        draft: false
        prerelease: false
        files: |
          fresh_r_v2.0.6.2_complete.zip
