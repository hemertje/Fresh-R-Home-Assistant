<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Fresh-R Logo - Modern ventilation icon -->
  <defs>
    <linearGradient id="freshGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00BCD4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0097A7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer circle representing fresh air -->
  <circle cx="12" cy="12" r="10" stroke="url(#freshGradient)" stroke-width="2" fill="none"/>
  
  <!-- Ventilation fan blades -->
  <g transform="translate(12,12)">
    <!-- Fan blade 1 -->
    <path d="M 0,-8 Q 3,-6 4,-3 Q 3,0 0,2 Q -3,0 -4,-3 Q -3,-6 0,-8" 
          fill="url(#freshGradient)" opacity="0.8"/>
    
    <!-- Fan blade 2 (rotated 120 degrees) -->
    <path d="M 0,-8 Q 3,-6 4,-3 Q 3,0 0,2 Q -3,0 -4,-3 Q -3,-6 0,-8" 
          fill="url(#freshGradient)" opacity="0.8" transform="rotate(120)"/>
    
    <!-- Fan blade 3 (rotated 240 degrees) -->
    <path d="M 0,-8 Q 3,-6 4,-3 Q 3,0 0,2 Q -3,0 -4,-3 Q -3,-6 0,-8" 
          fill="url(#freshGradient)" opacity="0.8" transform="rotate(240)"/>
    
    <!-- Center hub -->
    <circle cx="0" cy="0" r="2" fill="url(#freshGradient)"/>
  </g>
  
  <!-- Air flow arrows -->
  <g stroke="#00BCD4" stroke-width="1.5" fill="none" opacity="0.6">
    <!-- Top arrow -->
    <path d="M 12,4 L 12,2 M 10,4 L 12,2 L 14,4" stroke-linecap="round"/>
    <!-- Right arrow -->
    <path d="M 20,12 L 22,12 M 20,10 L 22,12 L 20,14" stroke-linecap="round"/>
    <!-- Bottom arrow -->
    <path d="M 12,20 L 12,22 M 10,20 L 12,22 L 14,20" stroke-linecap="round"/>
    <!-- Left arrow -->
    <path d="M 4,12 L 2,12 M 4,10 L 2,12 L 4,14" stroke-linecap="round"/>
  </g>
  
  <!-- Fresh-R text (optional, for larger versions) -->
  <text x="12" y="21" font-family="Arial, sans-serif" font-size="3" 
        text-anchor="middle" fill="#0097A7" font-weight="bold">FRESH-R</text>
</svg>
