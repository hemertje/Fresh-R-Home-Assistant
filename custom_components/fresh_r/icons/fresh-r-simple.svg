<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Fresh-R Logo - Simple version for small icons -->
  <defs>
    <linearGradient id="freshGradientSimple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00BCD4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0097A7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Ventilation fan representation -->
  <g transform="translate(12,12)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="8" stroke="url(#freshGradientSimple)" stroke-width="2" fill="none"/>
    
    <!-- Fan blades -->
    <g fill="url(#freshGradientSimple)">
      <!-- Blade 1 -->
      <ellipse cx="0" cy="-4" rx="3" ry="5" transform="rotate(0)"/>
      <!-- Blade 2 -->
      <ellipse cx="0" cy="-4" rx="3" ry="5" transform="rotate(120)"/>
      <!-- Blade 3 -->
      <ellipse cx="0" cy="-4" rx="3" ry="5" transform="rotate(240)"/>
    </g>
    
    <!-- Center hub -->
    <circle cx="0" cy="0" r="2" fill="url(#freshGradientSimple)"/>
  </g>
</svg>
