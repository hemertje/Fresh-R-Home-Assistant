<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Fresh-R Logo for GitHub Repository -->
  <defs>
    <linearGradient id="freshGradientGitHub" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00BCD4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0097A7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="url(#freshGradientGitHub)" opacity="0.1"/>
  <circle cx="50" cy="50" r="45" stroke="url(#freshGradientGitHub)" stroke-width="2" fill="none"/>
  
  <!-- Ventilation fan -->
  <g transform="translate(50,50)">
    <!-- Fan blades -->
    <g fill="url(#freshGradientGitHub)" opacity="0.8">
      <!-- Blade 1 -->
      <path d="M 0,-30 Q 8,-20 10,-10 Q 8,0 0,5 Q -8,0 -10,-10 Q -8,-20 0,-30" transform="rotate(0)"/>
      <!-- Blade 2 -->
      <path d="M 0,-30 Q 8,-20 10,-10 Q 8,0 0,5 Q -8,0 -10,-10 Q -8,-20 0,-30" transform="rotate(120)"/>
      <!-- Blade 3 -->
      <path d="M 0,-30 Q 8,-20 10,-10 Q 8,0 0,5 Q -8,0 -10,-10 Q -8,-20 0,-30" transform="rotate(240)"/>
    </g>
    
    <!-- Center hub -->
    <circle cx="0" cy="0" r="6" fill="url(#freshGradientGitHub)"/>
  </g>
  
  <!-- Air flow indicators -->
  <g stroke="#00BCD4" stroke-width="2" fill="none" opacity="0.6">
    <!-- Top arrow -->
    <path d="M 50,15 L 50,8 M 46,15 L 50,8 L 54,15" stroke-linecap="round"/>
    <!-- Right arrow -->
    <path d="M 85,50 L 92,50 M 85,46 L 92,50 L 85,54" stroke-linecap="round"/>
    <!-- Bottom arrow -->
    <path d="M 50,85 L 50,92 M 46,85 L 50,92 L 54,85" stroke-linecap="round"/>
    <!-- Left arrow -->
    <path d="M 15,50 L 8,50 M 15,46 L 8,50 L 15,54" stroke-linecap="round"/>
  </g>
  
  <!-- Fresh-R text -->
  <text x="50" y="88" font-family="Arial, sans-serif" font-size="8" 
        text-anchor="middle" fill="#0097A7" font-weight="bold">FRESH-R</text>
</svg>
