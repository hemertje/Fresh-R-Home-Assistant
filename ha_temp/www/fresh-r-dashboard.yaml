# Fresh-r Home Assistant Dashboard
# Replica of the Fresh-r.me dashboard
#
# Installation:
#   1. In HA go to Settings → Dashboards → Add Dashboard
#   2. Choose "YAML" and paste the content below
#   OR use the Raw configuration editor in existing dashboard
#
# Requirements:
#   - Fresh-r integration active (Settings → Devices & Services → Fresh-r)
#   - custom:fresh-r-card installed via www/fresh-r-card.js
#     (copy fresh-r-card.js to <config>/www/ and add to Lovelace resources)
#
# Resources to add in Lovelace (or in configuration.yaml):
#   lovelace:
#     resources:
#       - url: /local/fresh-r-card.js
#         type: module

title: Fresh-r
views:
  # ── Main Dashboard (Fresh-r.me replica) ──────────────────────────────────────
  - title: Dashboard
    path: fresh-r
    icon: mdi:air-filter
    badges: []
    cards:
      - type: custom:fresh-r-card
        entities:
          t1:             sensor.fresh_r_indoor_temperature
          t2:             sensor.fresh_r_outdoor_temperature
          t3:             sensor.fresh_r_supply_temperature
          t4:             sensor.fresh_r_exhaust_temperature
          flow:           sensor.fresh_r_flow_rate
          co2:            sensor.fresh_r_co2
          hum:            sensor.fresh_r_humidity
          dp:             sensor.fresh_r_dew_point
          d5_25:          sensor.fresh_r_supply_pm2_5
          d4_25:          sensor.fresh_r_outdoor_pm2_5
          d1_25:          sensor.fresh_r_indoor_pm2_5
          heat_recovered: sensor.fresh_r_heat_recovered
          vent_loss:      sensor.fresh_r_ventilation_loss
          energy_loss:    sensor.fresh_r_energy_loss

  # ── Sensor Overview ───────────────────────────────────────────────────────────
  - title: Sensors
    path: fresh-r-sensors
    icon: mdi:gauge
    badges: []
    cards:
      - type: entities
        title: Temperature Sensors
        show_header_toggle: false
        entities:
          - entity: sensor.fresh_r_indoor_temperature
            name: Indoor Temperature
            icon: mdi:thermometer
          - entity: sensor.fresh_r_outdoor_temperature
            name: Outdoor Temperature
            icon: mdi:thermometer-outdoor
          - entity: sensor.fresh_r_supply_temperature
            name: Supply Temperature
            icon: mdi:thermometer-plus
          - entity: sensor.fresh_r_exhaust_temperature
            name: Exhaust Temperature
            icon: mdi:thermometer-minus

      - type: entities
        title: Air Quality Sensors
        show_header_toggle: false
        entities:
          - entity: sensor.fresh_r_co2
            name: CO2
            icon: mdi:molecule-co2
          - entity: sensor.fresh_r_humidity
            name: Humidity
            icon: mdi:water-percent
          - entity: sensor.fresh_r_dew_point
            name: Dew Point
            icon: mdi:thermometer-low

      - type: entities
        title: Particulate Matter Sensors
        show_header_toggle: false
        entities:
          - entity: sensor.fresh_r_supply_pm2_5
            name: Supply PM2.5
            icon: mdi:air-filter
          - entity: sensor.fresh_r_outdoor_pm2_5
            name: Outdoor PM2.5
            icon: mdi:air-filter
          - entity: sensor.fresh_r_indoor_pm2_5
            name: Indoor PM2.5
            icon: mdi:air-filter

      - type: entities
        title: Flow & Energy Sensors
        show_header_toggle: false
        entities:
          - entity: sensor.fresh_r_flow_rate
            name: Flow Rate
            icon: mdi:wind-turbine
          - entity: sensor.fresh_r_heat_recovered
            name: Heat Recovered
            icon: mdi:fire
          - entity: sensor.fresh_r_ventilation_loss
            name: Ventilation Loss
            icon: mdi:fire-alert
          - entity: sensor.fresh_r_energy_loss
            name: Energy Loss
            icon: mdi:lightning-bolt

  # ── History Charts ─────────────────────────────────────────────────────────────
  - title: History
    path: fresh-r-history
    icon: mdi:chart-line
    badges: []
    cards:
      - type: history-graph
        title: Temperature History
        hours_to_show: 24
        refresh_interval: 60
        entities:
          - sensor.fresh_r_indoor_temperature
          - sensor.fresh_r_outdoor_temperature
          - sensor.fresh_r_supply_temperature
          - sensor.fresh_r_exhaust_temperature

      - type: history-graph
        title: Air Quality History
        hours_to_show: 24
        refresh_interval: 60
        entities:
          - sensor.fresh_r_co2
          - sensor.fresh_r_humidity
          - sensor.fresh_r_dew_point

      - type: history-graph
        title: Particulate Matter History
        hours_to_show: 24
        refresh_interval: 60
        entities:
          - sensor.fresh_r_supply_pm2_5
          - sensor.fresh_r_outdoor_pm2_5
          - sensor.fresh_r_indoor_pm2_5

      - type: history-graph
        title: Flow & Energy History
        hours_to_show: 24
        refresh_interval: 60
        entities:
          - sensor.fresh_r_flow_rate
          - sensor.fresh_r_heat_recovered
          - sensor.fresh_r_ventilation_loss
          - sensor.fresh_r_energy_loss
